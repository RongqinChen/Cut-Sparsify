dataset:
  path: data
  enc_dim: 18
  inmemory_transform:
    poly:
      poly_method: rrwp
    2fwl_bsr: {}
  follow_batch: [pair_x]
model:
  name: sppgn
  node_encoder: ogb
  edge_encoder: ogb
  pe_encoder: linear
  hidden_dim: 96
  attn_heads: 8
  attn_drop_prob: 0.5
  num_layers: 4
  mlp_depth: 2
  pooling: avg
  drop_prob: 0.05
  jk_mode: last
  task_type: graph_regression
  num_tasks: 11
  norm_type: batch
  act_type: relu
train:
  runs: 4
  save_dir: results/pep_struct
  batch_size: 16
  num_workers: 0
  lr: 0.001
  min_lr: 0
  weight_decay: 0.0
  num_warmup_epochs: 5
  num_epochs: 200
  optimizer: AdamW
  scheduler: cosine_with_warmup
  test_eval_interval: 5
